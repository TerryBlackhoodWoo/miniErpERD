<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>miniERP — ERD</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f5f5;
    color: #222;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }

  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 48px;
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    z-index: 1000;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  #toolbar .logo {
    font-size: 15px;
    font-weight: 700;
    color: #222;
    letter-spacing: 1px;
  }
  #toolbar .logo span { color: #c62828; }

  #toolbar .divider { width: 1px; height: 20px; background: #e0e0e0; }

  .btn {
    background: #f5f5f5;
    border: 1px solid #ddd;
    color: #555;
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn:hover { background: #eee; color: #222; border-color: #bbb; }

  .zone-filter { display: flex; gap: 6px; margin-left: auto; }
  .zone-btn {
    padding: 4px 10px;
    border-radius: 3px;
    font-size: 10px;
    cursor: pointer;
    border: 1px solid transparent;
    font-family: inherit;
    transition: all 0.15s;
    font-weight: 600;
  }
  .zone-btn.inactive { opacity: 0.3; }

  #canvas-wrap {
    position: fixed;
    top: 48px; left: 0; right: 0; bottom: 26px;
    overflow: hidden;
    cursor: grab;
    background: #f5f5f5;
    background-image: radial-gradient(#ddd 1px, transparent 1px);
    background-size: 24px 24px;
  }
  #canvas-wrap.dragging { cursor: grabbing; }

  #canvas { position: absolute; transform-origin: 0 0; }

  svg#lines {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    overflow: visible;
  }

  .table-card {
    position: absolute;
    width: 250px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #ddd;
    transition: border-color 0.15s, box-shadow 0.15s;
    cursor: move;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .table-card:hover { border-color: #aaa; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .table-card.selected { border-color: #c62828; box-shadow: 0 0 0 2px rgba(198,40,40,0.2), 0 4px 16px rgba(0,0,0,0.12); }

  .table-header {
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .table-name-ko { font-size: 12px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
  .table-name-en { font-size: 9px; color: rgba(255,255,255,0.6); font-style: italic; margin-top: 1px; }
  .table-badge {
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
    background: rgba(255,255,255,0.2);
    color: #fff;
  }

  .table-fields { border-top: 1px solid #f0f0f0; }
  .field-row {
    display: flex;
    align-items: center;
    padding: 5px 10px;
    border-bottom: 1px solid #f5f5f5;
    gap: 6px;
    font-size: 10px;
  }
  .field-row:last-child { border-bottom: none; }
  .field-icon { width: 14px; font-size: 9px; flex-shrink: 0; text-align: center; }
  .field-name { color: #333; flex: 1; }
  .field-type { color: #aaa; font-size: 9px; }
  .field-row.pk { background: #fffde7; }
  .field-row.pk .field-name { color: #f57f17; font-weight: 600; }
  .field-row.fk { background: #e8f5e9; }
  .field-row.fk .field-name { color: #2e7d32; }
  .field-row.nn .field-name { color: #b71c1c; }
  .field-divider { height: 1px; background: #eee; margin: 0; }

  /* 사이드 패널 */
  #side-panel {
    position: fixed;
    top: 48px; right: -300px;
    width: 280px;
    bottom: 26px;
    background: #fff;
    border-left: 1px solid #e0e0e0;
    transition: right 0.2s ease;
    z-index: 500;
    overflow-y: auto;
    padding: 20px 16px;
    box-shadow: -2px 0 8px rgba(0,0,0,0.06);
  }
  #side-panel.open { right: 0; }

  .panel-title { font-size: 14px; font-weight: 700; color: #222; margin-bottom: 2px; }
  .panel-sub { font-size: 10px; color: #aaa; margin-bottom: 16px; font-style: italic; }
  .panel-section { margin-bottom: 16px; }
  .panel-section-title {
    font-size: 9px;
    color: #aaa;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
    border-bottom: 1px solid #f0f0f0;
    padding-bottom: 4px;
  }
  .panel-field {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid #f5f5f5;
    font-size: 10px;
  }
  .panel-field:last-child { border-bottom: none; }
  .pf-left { display: flex; align-items: center; gap: 6px; }
  .pf-icon { font-size: 9px; width: 12px; text-align: center; }
  .pf-name { color: #333; }
  .pf-type { color: #aaa; }
  .pf-comment { font-size: 9px; color: #bbb; margin-top: 1px; padding-left: 18px; }

  #statusbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 26px;
    background: #fff;
    border-top: 1px solid #e0e0e0;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 20px;
    font-size: 10px;
    color: #bbb;
    z-index: 1000;
  }
  #statusbar b { color: #888; }
</style>
</head>
<body>

<div id="toolbar">
  <img src="miniERP.png" height="30" alt="miniERP" style="object-fit:contain;">
  <div style="font-size:10px;color:#aaa;">ERD Diagram</div>
  <div class="divider"></div>
  <button class="btn" onclick="resetView()">⌂ 전체보기</button>
  <button class="btn" onclick="toggleLines()">⟷ 관계선</button>
  <div class="zone-filter" id="zoneFilter"></div>
</div>

<div id="canvas-wrap">
  <div id="canvas">
    <svg id="lines"></svg>
  </div>
</div>

<div id="side-panel">
  <div id="panel-content"></div>
</div>

<div id="statusbar">
  <span>테이블 <b id="st-tables">0</b></span>
  <span>관계 <b id="st-rels">0</b></span>
  <span id="st-zoom">zoom 100%</span>
  <span id="st-selected" style="margin-left:auto;color:#c62828;font-weight:600;"></span>
</div>

<script>
const ZONES = {

};

      { name:'공급가액', pName:'supply_amt', type:'NUMERIC(15)', comment:'', nullable:true },
      { name:'부가세', pName:'vat_amt', type:'NUMERIC(15)', comment:'', nullable:true },
      { name:'세금계산서', pName:'tax_invoice_amt', type:'NUMERIC(15)', comment:'', nullable:true },
      { name:'매장운영비', pName:'store_fee', type:'NUMERIC(15)', comment:'', nullable:true },
      { name:'인센티브', pName:'incentive_amt', type:'NUMERIC(15)', comment:'', nullable:true },
      { name:'실지급액', pName:'final_amt', type:'NUMERIC(15)', comment:'', nullable:true },
      { name:'정산상태', pName:'settle_status', type:'VARCHAR(10)', comment:'PENDING/CONFIRMED/PAID', nullable:true },
      { name:'생성일시', pName:'created_at', type:'TIMESTAMP', comment:'', nullable:true }
    ]
  }
];

const RELATIONS = [
  { from:'vendor',    to:'brand',            label:'1:N' },
  { from:'brand',     to:'product',          label:'1:N' },
  { from:'vendor',    to:'product',          label:'1:N' },
  { from:'product',   to:'product_document', label:'1:N' },
  { from:'product',   to:'bom',              label:'1:N' },
  { from:'product',   to:'gwp',              label:'1:N' },
  { from:'bom',       to:'gwp',              label:'1:N' },
  { from:'store',    to:'bom',              label:'1:N' },
  { from:'store',     to:'warehouse_store',  label:'N:M' },
  { from:'warehouse', to:'warehouse_store',  label:'N:M' },
  { from:'store',     to:'gwp',              label:'1:N' },
  { from:'store',     to:'promotion',        label:'1:N' },
  { from:'product',   to:'promotion',        label:'1:N' },
  { from:'store',     to:'purchase_order',   label:'1:N' },
  { from:'warehouse', to:'purchase_order',   label:'1:N' },
  { from:'product',   to:'purchase_order',   label:'1:N' },
  { from:'warehouse', to:'inventory',        label:'1:N' },
  { from:'store',     to:'inventory',        label:'1:N' },
  { from:'product',   to:'inventory',        label:'1:N' },
  { from:'store',     to:'sales',            label:'1:N' },
  { from:'product',   to:'sales',            label:'1:N' },
  { from:'promotion', to:'sales',            label:'1:N' },
  { from:'vendor',    to:'settlement',       label:'1:N' },
  { from:'brand',     to:'settlement',       label:'1:N' },
  { from:'store',     to:'settlement',       label:'1:N' }
];

// ─── 상태 ─────────────────────────────────────────
let scale = 0.65, offsetX = 30, offsetY = 20;
let isPanning = false, panStart = {x:0,y:0};
let isDraggingCard = false, dragCard = null, dragStart = {x:0,y:0}, dragOrigPos = {x:0,y:0};
let selectedTable = null;
let showLines = true;
let activeZones = new Set(Object.keys(ZONES));
const cardEls = {}, tablePos = {};

function getZoneColor(id) {
  for (const [z,d] of Object.entries(ZONES)) if (d.tables.includes(id)) return d.color;
  return '#888';
}
function getZoneName(id) {
  for (const [z,d] of Object.entries(ZONES)) if (d.tables.includes(id)) return z;
  return '';
}

function renderCard(t) {
  const zc = getZoneColor(t.id), zn = getZoneName(t.id);
  const card = document.createElement('div');
  card.className = 'table-card';
  card.id = 'card-' + t.id;
  card.style.left = t.x + 'px';
  card.style.top  = t.y + 'px';

  let fh = '';
  for (const pk of t.pks) {
    fh += `<div class="field-row pk">
      <span class="field-icon">🔑</span>
      <span class="field-name">${pk.name}</span>
      <span class="field-type">${pk.type}</span>
    </div>`;
  }
  if (t.fields.length) fh += '<div class="field-divider"></div>';
  const vis = t.fields.slice(0,7), hid = t.fields.slice(7);
  for (const f of vis) {
    const cls = f.fk ? 'fk' : (!f.nullable ? 'nn' : '');
    const icon = f.fk ? '🔗' : (!f.nullable ? '✱' : '');
    fh += `<div class="field-row ${cls}">
      <span class="field-icon" style="font-size:8px;">${icon}</span>
      <span class="field-name">${f.name}</span>
      <span class="field-type">${f.type}</span>
    </div>`;
  }
  if (hid.length) fh += `<div class="field-row" style="color:#bbb;justify-content:center;font-size:9px;background:#fafafa;">+ ${hid.length}개 더</div>`;

  card.innerHTML = `
    <div class="table-header" style="background:${zc};">
      <div>
        <div class="table-name-ko">${t.name}</div>
        <div class="table-name-en">${t.pName}</div>
      </div>
      <span class="table-badge">${zn}</span>
    </div>
    <div class="table-fields">${fh}</div>`;

  card.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.stopPropagation();
    isDraggingCard = true; dragCard = t.id;
    dragStart = {x:e.clientX, y:e.clientY};
    dragOrigPos = {...tablePos[t.id]};
  });
  card.addEventListener('click', e => {
    if (Math.abs(e.clientX-dragStart.x)<3 && Math.abs(e.clientY-dragStart.y)<3) selectTable(t.id);
  });

  cardEls[t.id] = card;
  tablePos[t.id] = {x:t.x, y:t.y};
  document.getElementById('canvas').appendChild(card);
}

function selectTable(id) {
  if (selectedTable) { const p = document.getElementById('card-'+selectedTable); if(p) p.classList.remove('selected'); }
  if (selectedTable === id) {
    selectedTable = null;
    document.getElementById('side-panel').classList.remove('open');
    document.getElementById('st-selected').textContent = '';
    drawLines(); return;
  }
  selectedTable = id;
  document.getElementById('card-'+id)?.classList.add('selected');
  showPanel(id);
  document.getElementById('st-selected').textContent = id;
  drawLines();
}

function showPanel(id) {
  const t = TABLES.find(t=>t.id===id); if(!t) return;
  const zc = getZoneColor(id);
  const rels = RELATIONS.filter(r=>r.from===id||r.to===id);

  let pkH = t.pks.map(f=>`<div class="panel-field">
    <div class="pf-left"><span class="pf-icon">🔑</span><span class="pf-name" style="color:#f57f17;font-weight:600;">${f.name}</span></div>
    <span class="pf-type">${f.type}</span></div>
    ${f.comment?`<div class="pf-comment">${f.comment}</div>`:''}`).join('');

  let fH = t.fields.map(f=>`<div class="panel-field">
    <div class="pf-left">
      <span class="pf-icon">${f.fk?'🔗':(!f.nullable?'✱':'')}</span>
      <span class="pf-name" style="color:${f.fk?'#2e7d32':(!f.nullable?'#b71c1c':'#333')}">${f.name}</span>
    </div>
    <span class="pf-type">${f.type}</span></div>
    ${f.comment?`<div class="pf-comment">${f.comment}</div>`:''}`).join('');

  let rH = rels.map(r=>{
    const other = r.from===id?r.to:r.from;
    const dir = r.from===id?'→':'←';
    return `<div class="panel-field"><span style="color:#aaa;">${dir} ${other}</span><span class="pf-type">${r.label}</span></div>`;
  }).join('');

  document.getElementById('panel-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
      <div style="width:4px;height:20px;background:${zc};border-radius:2px;"></div>
      <div class="panel-title">${t.name}</div>
    </div>
    <div class="panel-sub">${t.pName} · ${getZoneName(id)}</div>
    <div class="panel-section"><div class="panel-section-title">Primary Key</div>${pkH}</div>
    <div class="panel-section"><div class="panel-section-title">Fields (${t.fields.length})</div>${fH}</div>
    ${rels.length?`<div class="panel-section"><div class="panel-section-title">Relations (${rels.length})</div>${rH}</div>`:''}`;
  document.getElementById('side-panel').classList.add('open');
}

function getCardEdge(fromId, toId) {
  const fp = tablePos[fromId], fe = cardEls[fromId];
  const tp = tablePos[toId],   te = cardEls[toId];
  if(!fp||!fe||!tp||!te) return null;
  const fx=fp.x+fe.offsetWidth/2, fy=fp.y+fe.offsetHeight/2;
  const tx=tp.x+te.offsetWidth/2, ty=tp.y+te.offsetHeight/2;
  const dx=tx-fx, dy=ty-fy;
  const w=fe.offsetWidth/2, h=fe.offsetHeight/2;
  let sx,sy;
  if(Math.abs(dx/w)>Math.abs(dy/h)){sx=fp.x+(dx>0?fe.offsetWidth:0);sy=fy+dy*(dx>0?w:-w)/(dx||1);}
  else{sy=fp.y+(dy>0?fe.offsetHeight:0);sx=fx+dx*(dy>0?h:-h)/(dy||1);}
  const tw=te.offsetWidth/2,th=te.offsetHeight/2;
  let ex,ey;
  if(Math.abs(-dx/tw)>Math.abs(-dy/th)){ex=tp.x+(-dx>0?te.offsetWidth:0);ey=ty+(-dy)*(-dx>0?tw:-tw)/(-dx||1);}
  else{ey=tp.y+(-dy>0?te.offsetHeight:0);ex=tx+(-dx)*(-dy>0?th:-th)/(-dy||1);}
  return {sx,sy,ex,ey};
}

function drawLines() {
  const svg = document.getElementById('lines');
  svg.innerHTML = '';
  if(!showLines) return;
  RELATIONS.forEach(rel=>{
    if(!activeZones.has(getZoneName(rel.from))||!activeZones.has(getZoneName(rel.to))) return;
    const pts = getCardEdge(rel.from, rel.to); if(!pts) return;
    const isHl = selectedTable&&(rel.from===selectedTable||rel.to===selectedTable);
    const zc = getZoneColor(rel.from);
    const m1x=pts.sx+(pts.ex-pts.sx)*0.35, m1y=pts.sy;
    const m2x=pts.sx+(pts.ex-pts.sx)*0.65, m2y=pts.ey;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${pts.sx},${pts.sy} C${m1x},${m1y} ${m2x},${m2y} ${pts.ex},${pts.ey}`);
    path.setAttribute('stroke', isHl?'#f9a825':'#f9a825');
    path.setAttribute('stroke-width', isHl?'2':'1');
    path.setAttribute('fill','none');
    path.setAttribute('opacity', isHl?'1':'0.4');
    svg.appendChild(path);
    if(isHl){
      const mx=(pts.sx+pts.ex)/2, my=(pts.sy+pts.ey)/2;
      const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
      bg.setAttribute('x',mx-14); bg.setAttribute('y',my-9);
      bg.setAttribute('width','28'); bg.setAttribute('height','13');
      bg.setAttribute('rx','3'); bg.setAttribute('fill','white');
      bg.setAttribute('stroke','#f9a825'); bg.setAttribute('stroke-width','1');
      svg.appendChild(bg);
      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',mx); txt.setAttribute('y',my);
      txt.setAttribute('text-anchor','middle'); txt.setAttribute('dominant-baseline','middle');
      txt.setAttribute('font-size','8'); txt.setAttribute('fill','#f9a825'); txt.setAttribute('font-weight','600');
      txt.textContent=rel.label; svg.appendChild(txt);
    }
  });
}

function buildZoneFilter() {
  const wrap=document.getElementById('zoneFilter');
  for(const [zone,data] of Object.entries(ZONES)){
    const btn=document.createElement('button');
    btn.className='zone-btn active';
    btn.style.background=data.color+'22';
    btn.style.color=data.color;
    btn.style.borderColor=data.color+'55';
    btn.textContent=zone; btn.dataset.zone=zone;
    btn.addEventListener('click',()=>{
      if(activeZones.has(zone)){if(activeZones.size===1)return;activeZones.delete(zone);btn.classList.replace('active','inactive');}
      else{activeZones.add(zone);btn.classList.replace('inactive','active');}
      TABLES.forEach(t=>{const el=cardEls[t.id];if(el)el.style.display=activeZones.has(getZoneName(t.id))?'block':'none';});
      drawLines();
    });
    wrap.appendChild(btn);
  }
}

function applyTransform(){
  document.getElementById('canvas').style.transform=`translate(${offsetX}px,${offsetY}px) scale(${scale})`;
  document.getElementById('st-zoom').textContent=`zoom ${Math.round(scale*100)}%`;
}
function resetView(){scale=0.65;offsetX=30;offsetY=20;applyTransform();}
function toggleLines(){showLines=!showLines;drawLines();}

const wrap=document.getElementById('canvas-wrap');
wrap.addEventListener('mousedown',e=>{
  if(e.target===wrap||e.target===document.getElementById('canvas')||e.target===document.getElementById('lines')){
    isPanning=true;panStart={x:e.clientX-offsetX,y:e.clientY-offsetY};wrap.classList.add('dragging');
    if(selectedTable){document.getElementById('card-'+selectedTable)?.classList.remove('selected');selectedTable=null;document.getElementById('side-panel').classList.remove('open');document.getElementById('st-selected').textContent='';drawLines();}
  }
});
document.addEventListener('mousemove',e=>{
  if(isPanning){offsetX=e.clientX-panStart.x;offsetY=e.clientY-panStart.y;applyTransform();}
  if(isDraggingCard&&dragCard){
    const dx=(e.clientX-dragStart.x)/scale, dy=(e.clientY-dragStart.y)/scale;
    const nx=dragOrigPos.x+dx, ny=dragOrigPos.y+dy;
    tablePos[dragCard]={x:nx,y:ny};
    const el=cardEls[dragCard]; if(el){el.style.left=nx+'px';el.style.top=ny+'px';}
    drawLines();
  }
});
document.addEventListener('mouseup',()=>{isPanning=false;isDraggingCard=false;dragCard=null;wrap.classList.remove('dragging');});
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const d=e.deltaY>0?0.9:1.1;
  const rect=wrap.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  offsetX=mx-(mx-offsetX)*d; offsetY=my-(my-offsetY)*d;
  scale=Math.min(Math.max(scale*d,0.2),2.5); applyTransform();
},{passive:false});

TABLES.forEach(renderCard);
buildZoneFilter();
applyTransform();
document.getElementById('st-tables').textContent=TABLES.length;
document.getElementById('st-rels').textContent=RELATIONS.length;
setTimeout(drawLines,100);
window.addEventListener('resize',drawLines);
</script>
